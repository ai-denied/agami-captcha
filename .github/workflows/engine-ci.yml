name: engine CI
on:
  push:
    branches: [ "main" ]
    paths:
      - 'captcha_engine/**'
      - 'captcha-frontend/**'   # 이미지에 위젯이 포함되므로 프론트 변경도 트리거 필요
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to Harbor
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.HARBOR_URL }}
          username: ${{ secrets.HARBOR_USERNAME }}
          password: ${{ secrets.HARBOR_PASSWORD }}
      - name: Generate Tag
        id: generate_tag
        run: echo "IMAGE_TAG=$(TZ='Asia/Seoul' date +'%y%m%d%H%M')" >> $GITHUB_ENV
      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: .                              # ← 레포 루트로 변경 (핵심 수정)
          file: ./captcha_engine/Dockerfile.prod
          platforms: linux/amd64
          provenance: false                       # M3 수동 빌드 때와 동일 조건
          sbom: false
          push: true
          tags: ${{ secrets.HARBOR_URL }}/agami/captcha-api:${{ env.IMAGE_TAG }}
